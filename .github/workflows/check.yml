name: Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Select Xcode (Swift 6 toolchain)
        run: sudo xcode-select -switch /Applications/Xcode.app
      - name: Report Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint --strict
