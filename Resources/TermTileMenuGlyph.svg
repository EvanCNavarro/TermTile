<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
  <!-- Menu-bar template glyph (#logo): the app icon's "T" motif — the crossbar (top row of 5 tiles)
       plus a single centered stem tile below. Matches the WHITE tiles of AppIcon.png so the menu-bar
       mark and the app icon read as the same logo. Solid black; macOS template rendering tints it. -->
  <g fill="#000000">
    <rect x="2"  y="3"  width="2" height="7" rx="1"/>
    <rect x="5"  y="3"  width="2" height="7" rx="1"/>
    <rect x="8"  y="3"  width="2" height="7" rx="1"/>
    <rect x="11" y="3"  width="2" height="7" rx="1"/>
    <rect x="14" y="3"  width="2" height="7" rx="1"/>
    <rect x="8"  y="11" width="2" height="4" rx="1"/>
  </g>
</svg>
